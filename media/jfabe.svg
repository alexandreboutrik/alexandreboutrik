<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" width="100%" height="100%">
  
  <!-- Define the shapes once so we don't have to duplicate the path coordinates -->
  <defs>
    <g id="java-icon-shapes">
      <!-- Top section of the document with folded corner -->
      <path d="M 22,57 L 22,12 C 22,10.9 22.9,10 24,10 L 63,10 L 78,25 L 78,57" />

      <!-- Inner lines of the dog-ear fold -->
      <path d="M 63,10 L 63,25 L 78,25" />

      <!-- Code symbols: < / > -->
      <path d="M 42,34 L 35,40 L 42,46" />
      <path d="M 52,32 L 48,48" />
      <path d="M 58,34 L 65,40 L 58,46" />

      <!-- Center banner rectangle -->
      <rect x="10" y="57" width="80" height="26" rx="3" />

      <!-- Letter J -->
      <path d="M 31,64 V 72.5 A 3.5,3.5 0 0,1 24,72.5" />

      <!-- Letter A -->
      <path d="M 36,76 L 41,64 L 46,76 M 38,71.5 H 44" />

      <!-- Letter V -->
      <path d="M 51,64 L 56.5,76 L 62,64" />

      <!-- Letter A -->
      <path d="M 67,76 L 72,64 L 77,76 M 69,71.5 H 75" />

      <!-- Bottom section of the document -->
      <path d="M 22,83 L 22,93 C 22,94.1 22.9,95 24,95 L 76,95 C 77.1,95 78,94.1 78,93 L 78,83" />
    </g>
  </defs>

  <g transform="translate(30, 0)">

    <!-- BACKGROUND LAYER: White outline (thicker stroke) -->
    <use href="#java-icon-shapes" stroke="white" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- FOREGROUND LAYER: Black inner lines (thinner stroke) -->
    <use href="#java-icon-shapes" stroke="black" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />

  </g>

</svg>

